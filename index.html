<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />

    <title>GKI Menteng - Jakarta</title>

    <meta name="description" content="GKI Menteng - Jakarta" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="robots" content="index, follow" />

    <link rel="icon" href="/logo_gkimenteng.png" />

    <link rel="canonical" href="https://gkimenteng-7.web.app/" />

    <!-- Open Graph -->
    <meta property="og:title" content="GKI MENTENG - JAKARTA" />
    <meta property="og:description" content="GKI Menteng - Jakarta" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gkimenteng-7.web.app/" />
    <meta
      property="og:image"
      content="https://gkimenteng-7.web.app/logo_gkimenteng.png"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&display=swap"
      rel="stylesheet"
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "GKI MENTENG - JAKARTA",
        "url": "https://gkimenteng-7.web.app"
      }
    </script>
  </head>
  <body>
    <div id="app">
      <div id="app-loading">
        <div class="app-loading-content">
          <div class="app-loading-logo-wrapper">
            <img src="/logo_gkimenteng_nobg.png" alt="GKI Menteng" class="app-loading-logo" />
            <div class="app-loading-cross">
              <svg viewBox="0 0 40 40" width="18" height="18" aria-hidden="true">
                <line x1="20" y1="4" x2="20" y2="36" stroke="#2e1217" stroke-width="3" stroke-linecap="round" />
                <line x1="8" y1="20" x2="32" y2="20" stroke="#2e1217" stroke-width="3" stroke-linecap="round" />
              </svg>
            </div>
          </div>
          <h1 class="app-loading-title">GKI Menteng</h1>
          <p class="app-loading-subtitle">Jakarta</p>
          <div class="app-loading-bar">
            <div class="app-loading-bar-inner"></div>
          </div>
          <p class="app-loading-verse">"For I know the plans I have for you"</p>
          <p class="app-loading-verse-ref">— Jeremiah 29:11</p>
        </div>
      </div>
      <style>
        #app-loading {
          position: fixed; inset: 0; z-index: 99999;
          display: flex; align-items: center; justify-content: center;
          background: linear-gradient(160deg, #2e1217 0%, #4a1d23 40%, #722f37 100%);
          font-family: "Playfair Display", Georgia, "Times New Roman", serif;
        }
        .app-loading-content { text-align: center; padding: 2rem; max-width: 420px; width: 100%; }
        .app-loading-logo-wrapper { position: relative; display: inline-block; margin-bottom: 1.5rem; }
        .app-loading-logo { width: 100px; height: auto; border-radius: 50%; display: block; }
        .app-loading-cross {
          position: absolute; bottom: -6px; right: -6px; width: 32px; height: 32px;
          background: linear-gradient(135deg, #c9a84c, #e0c97f); border-radius: 50%;
          display: flex; align-items: center; justify-content: center;
          box-shadow: 0 2px 12px rgba(201,168,76,0.5);
        }
        .app-loading-title { font-size: 1.75rem; font-weight: 700; color: #c9a84c; margin: 0; letter-spacing: 2px; }
        .app-loading-subtitle {
          font-size: 0.85rem; color: rgba(201,168,76,0.6); margin: 0.15rem 0 1.5rem;
          letter-spacing: 4px; text-transform: uppercase;
          font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .app-loading-bar { width: 200px; height: 2px; background: rgba(201,168,76,0.15); border-radius: 2px; margin: 0 auto 1.25rem; overflow: hidden; }
        .app-loading-bar-inner {
          width: 40%; height: 100%;
          background: linear-gradient(90deg, #c9a84c, #e0c97f, #c9a84c);
          border-radius: 2px; animation: appLoadingSlide 1.4s ease-in-out infinite;
        }
        .app-loading-verse { font-size: 0.9rem; font-style: italic; color: rgba(245,240,232,0.6); margin: 0 0 0.15rem; }
        .app-loading-verse-ref { font-size: 0.75rem; color: rgba(201,168,76,0.5); font-style: normal; margin: 0; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        @keyframes appLoadingSlide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }
        @media (max-width: 576px) {
          .app-loading-logo { width: 80px; }
          .app-loading-cross { width: 26px; height: 26px; }
          .app-loading-title { font-size: 1.4rem; }
          .app-loading-subtitle { font-size: 0.75rem; letter-spacing: 3px; }
          .app-loading-bar { width: 160px; }
          .app-loading-verse { font-size: 0.8rem; }
        }
      </style>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
